<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sunset Rush — Ocean Racing</title>
<style>
  :root{
    --hud-bg: rgba(10, 8, 24, 0.42);
    --hud-line: rgba(255,255,255,0.14);
    --amber: #ffb45e;
    --danger: #ff4d3d;
    --boost: #ffd54a;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#1a0f2e; }
  body{
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  #app{ position:fixed; inset:0; }
  #app canvas.game{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- flash layers ---------- */
  .layer{ position:absolute; inset:0; pointer-events:none; }
  #fadeout{
    background:#02030a; opacity:0; transition:opacity 700ms ease;
  }

  /* ---------- HUD ---------- */
  #hud{ position:absolute; inset:0; pointer-events:none; color:#fff; }
  .chip{
    background:var(--hud-bg); border:1px solid var(--hud-line);
    border-radius:14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }
  #speedo{
    position:absolute; top:22px; left:50%; transform:translateX(-50%);
    padding:8px 26px 10px; text-align:center; min-width:190px;
  }
  #speedVal{
    font-size:52px; font-weight:800; font-style:italic; line-height:1;
    letter-spacing:-1px; font-variant-numeric: tabular-nums;
    text-shadow: 0 0 22px rgba(255,170,80,0.75);
  }
  #speedo .unit{ display:block; font-size:12px; font-weight:600; letter-spacing:4px; opacity:0.75; margin-top:2px; }
  #timer{
    position:absolute; bottom:74px; left:24px;
    padding:6px 16px 7px; text-align:left; min-width:118px;
  }
  #timerVal{
    font-size:28px; font-weight:800; font-style:italic; line-height:1;
    letter-spacing:-0.5px; font-variant-numeric: tabular-nums;
  }
  #timer .unit{ display:block; font-size:10px; font-weight:600; letter-spacing:3px; opacity:0.7; margin-top:2px; }
  #bonusPop{
    position:absolute; bottom:132px; left:26px;
    font-size:15px; font-weight:800; letter-spacing:2px; color:#6dffa0;
    text-shadow:0 0 12px rgba(90,255,140,0.85); opacity:0; pointer-events:none;
    transition:opacity 220ms ease, transform 220ms ease;
  }
  #bonusPop.show{ opacity:1; transform:translateY(-12px); }
  #stats{
    position:absolute; top:22px; left:22px; padding:12px 18px;
    display:flex; flex-direction:column; gap:8px; font-size:15px; font-weight:600;
  }
  #stats .row{ display:flex; align-items:center; gap:9px; }
  #stats svg{ width:18px; height:18px; flex:none; }
  #stats .val{ font-variant-numeric: tabular-nums; letter-spacing:0.5px; }
  #stats .best{ font-size:11px; font-weight:600; letter-spacing:2px; opacity:0.6; }
  #minimapWrap{
    position:absolute; top:22px; right:22px; padding:10px;
  }
  #minimap{ display:block; width:128px; height:128px; }

  /* ---------- center meter ---------- */
  #meterWrap{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    width:340px; padding:10px 14px 12px; text-align:center;
  }
  #meterLabel{
    font-size:10px; font-weight:700; letter-spacing:4px; opacity:0.7; margin-bottom:7px;
  }
  #meter{
    position:relative; height:14px; border-radius:8px; overflow:hidden;
    background: linear-gradient(90deg,
      #ff4d3d 0%, #ffb44d 22%, rgba(74,222,128,0.85) 40%,
      #4ade80 50%, rgba(74,222,128,0.85) 60%, #ffb44d 78%, #ff4d3d 100%);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.45);
  }
  #meter::after{
    content:""; position:absolute; left:50%; top:0; bottom:0; width:2px;
    background:rgba(255,255,255,0.85); transform:translateX(-1px);
  }
  #carMarker{
    position:absolute; top:-3px; width:12px; height:20px; left:50%;
    margin-left:-6px; border-radius:4px; background:#fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.95), 0 0 4px rgba(255,255,255,1);
  }
  #warn{
    position:absolute; bottom:92px; left:50%; transform:translateX(-50%);
    font-size:15px; font-weight:800; letter-spacing:3px; color:var(--danger);
    text-shadow:0 0 14px rgba(255,60,40,0.9); opacity:0;
    animation: warnPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes warnPulse{ from{ transform:translateX(-50%) scale(1);} to{ transform:translateX(-50%) scale(1.07);} }
  #boostText{
    position:absolute; bottom:92px; left:50%; transform:translateX(-50%);
    font-size:17px; font-weight:800; font-style:italic; letter-spacing:3px; color:var(--boost);
    text-shadow:0 0 16px rgba(255,210,70,0.95); opacity:0; transition:opacity 150ms;
  }
  #popText{
    position:absolute; top:32%; left:50%; transform:translateX(-50%) scale(0.6);
    font-size:88px; font-weight:900; font-style:italic; letter-spacing:2px;
    background: linear-gradient(180deg, #fff2a8, #ff6bd0);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 0 24px rgba(255,120,210,0.7));
    opacity:0; pointer-events:none;
  }
  #popText.show{ animation: popPrompt 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes popPrompt{
    0%{ opacity:0; transform:translateX(-50%) scale(0.6) rotate(-8deg); }
    60%{ opacity:1; transform:translateX(-50%) scale(1.12) rotate(3deg); }
    100%{ opacity:1; transform:translateX(-50%) scale(1) rotate(0deg); }
  }

  /* ---------- overlay (countdown / game over) ---------- */
  #overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none; color:#fff;
  }
  #title{
    font-size:30px; font-weight:800; font-style:italic; letter-spacing:8px;
    background: linear-gradient(180deg, #ffe9c4, #ff9d4d);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 2px 16px rgba(255,140,50,0.55));
    margin-bottom:10px;
  }
  #bignum{
    font-size:170px; font-weight:900; font-style:italic; line-height:1;
    text-shadow: 0 0 44px rgba(255,180,90,0.9), 0 6px 30px rgba(0,0,0,0.5);
    opacity:0;
  }
  #bignum.pop{ animation: pop 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes pop{
    0%{ opacity:0; transform:scale(2.1); }
    18%{ opacity:1; transform:scale(1); }
    75%{ opacity:1; }
    100%{ opacity:0; transform:scale(0.82); }
  }
  #gameover{ display:none; text-align:center; }
  #gameover h1{
    font-size:78px; font-weight:900; font-style:italic; letter-spacing:6px; color:#ff5040;
    text-shadow:0 0 40px rgba(255,50,30,0.8), 0 6px 30px rgba(0,0,0,0.6);
  }
  #gameover h1.finish{ color:#6dffa0; text-shadow:0 0 40px rgba(90,255,140,0.8), 0 6px 30px rgba(0,0,0,0.6); }
  #gameover p{ margin-top:14px; font-size:19px; font-weight:600; letter-spacing:2px; opacity:0.9; }
  #gameover p.highscore{
    font-size:24px; font-weight:900; font-style:italic; letter-spacing:6px; color:var(--amber); opacity:1;
    text-shadow:0 0 20px rgba(255,180,80,0.85);
  }
  #gameover .sub{ margin-top:6px; font-size:14px; opacity:0.6; letter-spacing:1px; }

  /* ---------- leaderboard (below the track map) ---------- */
  #leaderboard{
    position:absolute; top:196px; right:22px; width:148px;
    padding:10px 12px 11px; text-align:center; pointer-events:auto;
  }
  #lbTitle{ font-size:9px; font-weight:700; letter-spacing:2px; opacity:0.7; margin-bottom:7px; }
  #lbList{ list-style:none; display:flex; flex-direction:column; gap:4px; }
  #lbList li{
    display:flex; justify-content:space-between; gap:10px;
    font-size:13px; font-weight:600; letter-spacing:0.5px;
  }
  #lbList .lbRank{ opacity:0.55; width:1.3em; text-align:left; }
  #lbList .lbScore{ color:var(--amber); font-variant-numeric: tabular-nums; }
  #lbList .lbEmpty{ opacity:0.5; justify-content:center; font-weight:500; font-size:11px; }
  #clearScores{
    margin-top:10px; padding:5px 12px; font: inherit; font-size:10px; font-weight:700;
    letter-spacing:2px; color:rgba(255,255,255,0.75); cursor:pointer;
    background:rgba(255,255,255,0.06); border:1px solid var(--hud-line); border-radius:8px;
    transition:background 150ms, color 150ms;
  }
  #clearScores:hover{ background:rgba(255,77,61,0.18); color:#ff9d90; border-color:rgba(255,77,61,0.5); }

  #help{
    position:absolute; bottom:34px; right:26px; padding:10px 16px;
    font-size:13px; font-weight:600; letter-spacing:1px; opacity:0.85;
    transition:opacity 1.2s ease;
  }
  #help kbd{
    display:inline-block; padding:2px 8px; margin:0 2px; border-radius:6px;
    background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.25);
    font-family:inherit; font-size:12px; font-weight:700;
  }
  #mute{
    position:absolute; bottom:34px; left:26px; padding:9px 13px; cursor:pointer;
    pointer-events:auto; font-size:16px; line-height:1;
  }
  #err{
    display:none; position:absolute; left:10px; bottom:10px; max-width:80%;
    background:rgba(120,0,0,0.85); color:#fff; font:12px/1.5 monospace;
    padding:8px 12px; border-radius:8px; z-index:99; white-space:pre-wrap;
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="speedo" class="chip">
      <span id="speedVal">0</span>
      <span class="unit">KM/H</span>
    </div>
    <div id="timer" class="chip">
      <span id="timerVal">0.0s</span>
      <span class="unit">LAP TIME</span>
    </div>
    <div id="bonusPop"></div>
    <div id="popText">POP!</div>
    <div id="stats" class="chip">
      <div class="row">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#ffd04a" stroke="#b8860b" stroke-width="2"/><circle cx="12" cy="12" r="5" fill="none" stroke="#b8860b" stroke-width="1.6"/></svg>
        <span class="val" id="coinCount">0</span>
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M2 12h13M12 7l7 5-7 5" stroke="#7de3ff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="12" r="2.6" fill="#ff5040"/></svg>
        <span class="val" id="wreckCount">0</span>
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M4 19L10 5l4 9 3-5 3 10z" fill="none" stroke="#c9b0ff" stroke-width="2" stroke-linejoin="round"/></svg>
        <span class="val" id="distVal">0 m</span>
      </div>
      <div class="best" id="bestVal"></div>
    </div>
    <div id="minimapWrap" class="chip"><canvas id="minimap" width="256" height="256"></canvas></div>
    <div id="leaderboard" class="chip">
      <div id="lbTitle">TOP 5 &mdash; FASTEST LAPS</div>
      <ol id="lbList"></ol>
      <button id="clearScores" type="button">CLEAR</button>
    </div>
    <div id="warn">OFF CENTER &mdash; SLOWING</div>
    <div id="boostText">SPEED BOOST</div>
    <div id="meterWrap" class="chip">
      <div id="meterLabel">STAY CENTERED</div>
      <div id="meter"><div id="carMarker"></div></div>
    </div>
    <div id="help" class="chip"><kbd>&#9664;</kbd><kbd>&#9654;</kbd> steer &nbsp;&middot;&nbsp; <kbd>&#9650;</kbd> wheelie &nbsp;&middot;&nbsp; <kbd>SPACE</kbd> laser</div>
    <div id="mute" class="chip" title="Toggle sound (M)">&#128266;</div>
  </div>
  <div id="overlay">
    <div id="title">SUNSET RUSH</div>
    <div id="credit" style="font-size:10px; letter-spacing:1px; opacity:0.55; margin-bottom:6px;">
      Audi e-tron GT model by gbarzu &middot; CC-BY-4.0
    </div>
    <div id="bignum"></div>
    <div id="gameover">
      <h1 id="goHeadline">GAME OVER</h1>
      <p id="goStats"></p>
      <p class="sub" id="goRestart"></p>
    </div>
  </div>
  <div id="fadeout" class="layer"></div>
  <div id="err"></div>
</div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script src="etron-model.js"></script>
<script src="game.js"></script>
</body>
</html>
